<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Tareas</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="apple-touch-icon" href="/icon.png" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; }
    input, select, button, textarea { font-family: inherit; }
    input[type=date] { color-scheme: light; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const SUPABASE_URL = "https://ldfqousbkhauynwnbruu.supabase.co";
const SUPABASE_KEY = "sb_publishable_igstdjvbViE3YJS8WYIPsQ_8DYysveY";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const { useState, useEffect } = React;

const CATS = ["Personal","Trabajo","Estudio","Salud","Otro"];
const CAT_COLORS = {
  Personal: "#7F77DD", Trabajo: "#1D9E75", Estudio: "#378ADD",
  Salud: "#D4537E", Otro: "#888780"
};
const QUAD = [
  { key:"UI",   label:"Urgente + Importante",      color:"#E24B4A", bg:"#FCEBEB" },
  { key:"NUI",  label:"No urgente + Importante",   color:"#1D9E75", bg:"#E1F5EE" },
  { key:"UNI",  label:"Urgente + No importante",   color:"#BA7517", bg:"#FAEEDA" },
  { key:"NUNI", label:"No urgente + No importante",color:"#888780", bg:"#F1EFE8" },
];
function getQuad(imp, urg) {
  if (imp && urg)  return "UI";
  if (imp && !urg) return "NUI";
  if (!imp && urg) return "UNI";
  return "NUNI";
}
const EMPTY_FORM = { title:"", category:"Personal", deadline:"", important:false, urgent:false, subtasks:[] };

function agendaGroups(tasks) {
  const today = new Date(); today.setHours(0,0,0,0);
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate()+1);
  const weekEnd  = new Date(today); weekEnd.setDate(today.getDate()+7);
  const groups = [
    { key:"overdue",  label:"Vencidas",       color:"#E24B4A", tasks:[] },
    { key:"today",    label:"Hoy",             color:"#D4537E", tasks:[] },
    { key:"tomorrow", label:"Mañana",          color:"#BA7517", tasks:[] },
    { key:"week",     label:"Esta semana",     color:"#1D9E75", tasks:[] },
    { key:"later",    label:"Más adelante",    color:"#378ADD", tasks:[] },
    { key:"none",     label:"Sin fecha",       color:"#888780", tasks:[] },
  ];
  tasks.filter(t => !t.done).forEach(t => {
    if (!t.deadline) { groups[5].tasks.push(t); return; }
    const d = new Date(t.deadline); d.setHours(0,0,0,0);
    if      (d < today)                        groups[0].tasks.push(t);
    else if (d.getTime()===today.getTime())    groups[1].tasks.push(t);
    else if (d.getTime()===tomorrow.getTime()) groups[2].tasks.push(t);
    else if (d <= weekEnd)                     groups[3].tasks.push(t);
    else                                       groups[4].tasks.push(t);
  });
  return groups.filter(g => g.tasks.length > 0);
}

function App() {
  const [tasks,    setTasks]    = useState([]);
  const [view,     setView]     = useState("lista");
  const [showForm, setShowForm] = useState(false);
  const [form,     setForm]     = useState(EMPTY_FORM);
  const [newSub,   setNewSub]   = useState("");
  const [filterCat,setFilterCat]= useState("Todas");
  const [editId,   setEditId]   = useState(null);
  const [expanded, setExpanded] = useState({});

  useEffect(() => {
    try {
      const saved = localStorage.getItem("tareas_v1");
      if (saved) setTasks(JSON.parse(saved));
    } catch {}
  }, []);

  function save(t) {
    setTasks(t);
    try { localStorage.setItem("tareas_v1", JSON.stringify(t)); } catch {}
  }

  function openNew()  { setForm(EMPTY_FORM); setEditId(null); setShowForm(true); setNewSub(""); }
  function openEdit(task) {
    setForm({ title:task.title, category:task.category, deadline:task.deadline||"",
              important:task.important, urgent:task.urgent, subtasks:[...task.subtasks] });
    setEditId(task.id); setShowForm(true); setNewSub("");
  }
  function addSub() {
    if (!newSub.trim()) return;
    setForm(f => ({ ...f, subtasks:[...f.subtasks,{text:newSub.trim(),done:false}] }));
    setNewSub("");
  }
  function removeSub(i) { setForm(f => ({ ...f, subtasks:f.subtasks.filter((_,j)=>j!==i) })); }
  function submitForm() {
    if (!form.title.trim()) return;
    if (editId) {
      save(tasks.map(t => t.id===editId ? {...t,...form,quad:getQuad(form.important,form.urgent)} : t));
    } else {
      save([...tasks, {...form, id:Date.now(), done:false, quad:getQuad(form.important,form.urgent)}]);
    }
    setShowForm(false);
  }
  function toggleDone(id) { save(tasks.map(t => t.id===id ? {...t,done:!t.done} : t)); }
  function toggleSub(tid,si) {
    save(tasks.map(t => t.id===tid
      ? {...t, subtasks:t.subtasks.map((s,i)=>i===si?{...s,done:!s.done}:s)}
      : t));
  }
  function deleteTask(id) { save(tasks.filter(t => t.id!==id)); }
  function toggleExpand(id) { setExpanded(e => ({...e,[id]:!e[id]})); }

  if (loading) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh",color:"#888",fontSize:14}}>
      Cargando tareas...
    </div>
  );==="Todas" ? tasks : tasks.filter(t=>t.category===filterCat);
  const pending  = filtered.filter(t=>!t.done);
  const done     = filtered.filter(t=>t.done);

  const s = {
    wrap:    { fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif", padding:"16px", maxWidth:720, margin:"0 auto" },
    header:  { display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 },
    title:   { fontSize:20, fontWeight:600, color:"#111", margin:0 },
    tabs:    { display:"flex", gap:8, marginBottom:16, flexWrap:"wrap" },
    tab:     a => ({ padding:"6px 14px", borderRadius:20, border:"1px solid #ddd",
                     background:a?"#111":"transparent", color:a?"#fff":"#666",
                     cursor:"pointer", fontSize:13, fontWeight:a?500:400 }),
    btn:     { padding:"8px 18px", borderRadius:8, border:"none",
                background:"#111", color:"#fff", cursor:"pointer", fontSize:13, fontWeight:500 },
    outBtn:  { padding:"6px 12px", borderRadius:8, border:"1px solid #ddd",
                background:"transparent", color:"#666", cursor:"pointer", fontSize:12 },
    card:    { background:"#fff", border:"1px solid #eee", borderRadius:12,
                padding:"12px 14px", marginBottom:8, boxShadow:"0 1px 3px rgba(0,0,0,0.05)" },
    pill:    cat => ({ display:"inline-block", fontSize:11, padding:"2px 8px", borderRadius:20,
                       background:CAT_COLORS[cat]+"22", color:CAT_COLORS[cat], fontWeight:500 }),
    badge:   q  => { const qd=QUAD.find(x=>x.key===q)||QUAD[3];
                     return { fontSize:11, padding:"2px 8px", borderRadius:20, background:qd.bg, color:qd.color, fontWeight:500 }; },
    input:   { width:"100%", padding:"9px 11px", borderRadius:8, border:"1px solid #ddd",
                background:"#fff", color:"#111", fontSize:14, marginBottom:10, outline:"none" },
    label:   { fontSize:13, color:"#666", display:"block", marginBottom:4 },
    check:   done => ({ width:18, height:18, borderRadius:9, border:`2px solid ${done?"#1D9E75":"#ccc"}`,
                        background:done?"#1D9E75":"transparent", cursor:"pointer", flexShrink:0,
                        display:"flex", alignItems:"center", justifyContent:"center" }),
    overlay: { position:"fixed", inset:0, background:"rgba(0,0,0,0.45)", zIndex:100,
                display:"flex", alignItems:"center", justifyContent:"center", padding:16 },
    modal:   { background:"#fff", borderRadius:16, boxShadow:"0 8px 40px rgba(0,0,0,0.18)",
                padding:24, width:"100%", maxWidth:480, maxHeight:"90vh", overflowY:"auto" },
    quadGrid:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8 },
    subItem: { display:"flex", alignItems:"center", gap:8, padding:"5px 0",
                borderTop:"1px solid #f0f0f0", marginTop:4 },
  };

  function TaskCard({ task }) {
    const exp    = expanded[task.id];
    const subDone= task.subtasks.filter(s=>s.done).length;
    return (
      <div style={s.card}>
        <div style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
          <div style={s.check(task.done)} onClick={()=>toggleDone(task.id)}>
            {task.done && <span style={{color:"#fff",fontSize:10,fontWeight:700}}>✓</span>}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{fontSize:14,fontWeight:500,
                color:task.done?"#aaa":"#111",
                textDecoration:task.done?"line-through":"none"}}>{task.title}</span>
              <span style={s.pill(task.category)}>{task.category}</span>
              <span style={s.badge(task.quad)}>{QUAD.find(x=>x.key===task.quad)?.label}</span>
            </div>
            <div style={{display:"flex",gap:12,marginTop:4,fontSize:12,color:"#888",flexWrap:"wrap"}}>
              {task.deadline && <span>Límite: {task.deadline}</span>}
              {task.subtasks.length>0 && (
                <span style={{cursor:"pointer"}} onClick={()=>toggleExpand(task.id)}>
                  Subtareas {subDone}/{task.subtasks.length} {exp?"▲":"▼"}
                </span>
              )}
            </div>
            {exp && task.subtasks.map((sub,i)=>(
              <div key={i} style={s.subItem}>
                <div style={s.check(sub.done)} onClick={()=>toggleSub(task.id,i)}>
                  {sub.done && <span style={{color:"#fff",fontSize:9,fontWeight:700}}>✓</span>}
                </div>
                <span style={{fontSize:13,color:sub.done?"#aaa":"#111",
                  textDecoration:sub.done?"line-through":"none"}}>{sub.text}</span>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            <button style={s.outBtn} onClick={()=>openEdit(task)}>Editar</button>
            <button style={{...s.outBtn,color:"#E24B4A"}} onClick={()=>deleteTask(task.id)}>✕</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={s.wrap}>
      <div style={s.header}>
        <h1 style={s.title}>Mis tareas</h1>
        <button style={s.btn} onClick={openNew}>+ Nueva tarea</button>
      </div>

      <div style={s.tabs}>
        {["Lista","Agenda","Matriz"].map(v=>(
          <button key={v} style={s.tab(view===v.toLowerCase())} onClick={()=>setView(v.toLowerCase())}>{v}</button>
        ))}
        <div style={{flex:1}}/>
        <select style={{...s.outBtn,padding:"6px 10px"}} value={filterCat} onChange={e=>setFilterCat(e.target.value)}>
          {["Todas",...CATS].map(c=><option key={c}>{c}</option>)}
        </select>
      </div>

      {/* ── AGENDA ── */}
      {view==="agenda" && (
        <>
          {agendaGroups(filtered).length===0 && (
            <div style={{textAlign:"center",padding:40,color:"#aaa",fontSize:14}}>No hay tareas pendientes.</div>
          )}
          {agendaGroups(filtered).map(g=>(
            <div key={g.key} style={{marginBottom:20}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <div style={{width:10,height:10,borderRadius:5,background:g.color,flexShrink:0}}/>
                <span style={{fontSize:13,fontWeight:600,color:g.color}}>{g.label}</span>
                <div style={{flex:1,height:1,background:"#eee"}}/>
                <span style={{fontSize:12,color:"#aaa"}}>{g.tasks.length} tarea{g.tasks.length!==1?"s":""}</span>
              </div>
              {g.tasks.map(t=><TaskCard key={t.id} task={t}/>)}
            </div>
          ))}
        </>
      )}

      {/* ── LISTA ── */}
      {view==="lista" && (
        <>
          {pending.length===0 && done.length===0 && (
            <div style={{textAlign:"center",padding:40,color:"#aaa",fontSize:14}}>No hay tareas. ¡Crea una!</div>
          )}
          {pending.map(t=><TaskCard key={t.id} task={t}/>)}
          {done.length>0 && (
            <>
              <div style={{fontSize:12,color:"#aaa",margin:"16px 0 8px",fontWeight:500,letterSpacing:1}}>
                COMPLETADAS ({done.length})
              </div>
              {done.map(t=><TaskCard key={t.id} task={t}/>)}
            </>
          )}
        </>
      )}

      {/* ── MATRIZ ── */}
      {view==="matriz" && (
        <>
          <div style={{fontSize:12,color:"#888",marginBottom:10}}>Matriz de Eisenhower — tareas pendientes</div>
          <div style={s.quadGrid}>
            {QUAD.map(q=>{
              const qt=tasks.filter(t=>t.quad===q.key&&!t.done&&(filterCat==="Todas"||t.category===filterCat));
              return (
                <div key={q.key} style={{background:q.bg,borderRadius:8,padding:12,minHeight:80,border:`1px solid ${q.color}33`}}>
                  <div style={{fontSize:11,fontWeight:600,color:q.color,marginBottom:6}}>{q.label}</div>
                  {qt.length===0 && <div style={{fontSize:12,color:q.color+"99"}}>Sin tareas</div>}
                  {qt.map(t=>(
                    <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,
                      background:"#fff",border:`1px solid ${q.color}55`,borderRadius:6,
                      padding:"5px 8px",boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
                      <div style={{width:12,height:12,borderRadius:6,border:`2px solid ${q.color}`,flexShrink:0,cursor:"pointer"}}
                        onClick={()=>toggleDone(t.id)}/>
                      <span style={{fontSize:13,color:"#222",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</span>
                      {t.deadline&&<span style={{fontSize:10,color:q.color,flexShrink:0}}>{t.deadline.slice(5)}</span>}
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* ── MODAL NUEVA/EDITAR TAREA ── */}
      {showForm && (
        <div style={s.overlay} onClick={e=>{if(e.target===e.currentTarget)setShowForm(false);}}>
          <div style={s.modal}>
            <h2 style={{margin:"0 0 16px",fontWeight:600,fontSize:16,color:"#111"}}>
              {editId?"Editar tarea":"Nueva tarea"}
            </h2>
            <label style={s.label}>Título</label>
            <input style={s.input} value={form.title}
              onChange={e=>setForm(f=>({...f,title:e.target.value}))}
              placeholder="Nombre de la tarea"
              onKeyDown={e=>{if(e.key==="Enter")submitForm();}} />
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div>
                <label style={s.label}>Categoría</label>
                <select style={{...s.input,marginBottom:0}} value={form.category}
                  onChange={e=>setForm(f=>({...f,category:e.target.value}))}>
                  {CATS.map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              <div>
                <label style={s.label}>Fecha límite</label>
                <input type="date" style={{...s.input,marginBottom:0}} value={form.deadline}
                  onChange={e=>setForm(f=>({...f,deadline:e.target.value}))}/>
              </div>
            </div>
            <div style={{display:"flex",gap:20,margin:"14px 0"}}>
              <label style={{display:"flex",alignItems:"center",gap:8,fontSize:14,cursor:"pointer",color:"#111"}}>
                <input type="checkbox" checked={form.important}
                  onChange={e=>setForm(f=>({...f,important:e.target.checked}))}/>
                Importante
              </label>
              <label style={{display:"flex",alignItems:"center",gap:8,fontSize:14,cursor:"pointer",color:"#111"}}>
                <input type="checkbox" checked={form.urgent}
                  onChange={e=>setForm(f=>({...f,urgent:e.target.checked}))}/>
                Urgente
              </label>
            </div>
            {(form.important||form.urgent) && (
              <div style={{...s.badge(getQuad(form.important,form.urgent)),display:"inline-block",marginBottom:12}}>
                {QUAD.find(x=>x.key===getQuad(form.important,form.urgent))?.label}
              </div>
            )}
            <label style={s.label}>Subtareas</label>
            {form.subtasks.map((sub,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <span style={{flex:1,fontSize:13,color:"#111"}}>{sub.text}</span>
                <button style={{...s.outBtn,color:"#E24B4A",padding:"2px 8px"}} onClick={()=>removeSub(i)}>✕</button>
              </div>
            ))}
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              <input style={{...s.input,marginBottom:0,flex:1}} value={newSub}
                onChange={e=>setNewSub(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")addSub();}}
                placeholder="Añadir subtarea..."/>
              <button style={s.outBtn} onClick={addSub}>+</button>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button style={s.outBtn} onClick={()=>setShowForm(false)}>Cancelar</button>
              <button style={s.btn} onClick={submitForm}>{editId?"Guardar cambios":"Crear tarea"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");
</script>
</body>
</html>
